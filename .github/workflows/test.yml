---
name: test
on:
  push:
    branches:
      - main
      - v2
  pull_request:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache: true
      - name: Install go-ctrf-json-reporter
        run: go install github.com/ctrf-io/go-ctrf-json-reporter/cmd/go-ctrf-json-reporter@latest
      - name: Run tests
        run: go test -json ./... | go-ctrf-json-reporter -o test-results.json
      - name: Publish Test Report
        uses: ctrf-io/github-test-reporter@1a5c600d1dc0f102d6492b747f34d45ed4d26eea # v1
        with:
          report-path: test-results.json
          github-report: true
        if: always()
